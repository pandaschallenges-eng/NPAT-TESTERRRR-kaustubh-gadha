<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NPAT Mock – Number System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',system-ui,sans-serif;background:#08080f;color:#e8e6f8;min-height:100vh;padding-bottom:60px;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#12102a 0%,#1a1030 100%);border-bottom:1px solid rgba(160,140,255,0.15);padding:20px 16px 16px;text-align:center;}
.header-badge{display:inline-block;background:rgba(124,110,230,0.15);border:1px solid rgba(124,110,230,0.35);color:#b8abff;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:10px;}
.header h1{font-size:22px;font-weight:700;color:#f0eeff;margin-bottom:4px;}
.header p{font-size:13px;color:#8b88b0;}
.meta-row{display:flex;justify-content:center;gap:20px;margin-top:12px;}
.meta-item{text-align:center;}
.meta-val{font-size:18px;font-weight:700;color:#a89cf5;}
.meta-lbl{font-size:10px;color:#5e5c78;text-transform:uppercase;letter-spacing:.06em;}

/* ── TIMER BAR ── */
.timer-bar{position:sticky;top:0;z-index:50;background:rgba(8,8,15,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.timer-label{font-size:12px;color:#5e5c78;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.timer-val{font-size:20px;font-weight:700;color:#4ade80;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.timer-val.warn{color:#fbbf24;}
.timer-val.danger{color:#f87171;}
.progress-pill{font-size:12px;color:#8b88b0;background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:100px;}

/* ── PROGRESS TRACK ── */
.prog-track{height:3px;background:rgba(255,255,255,0.06);}
.prog-fill{height:100%;background:linear-gradient(90deg,#7c6ee6,#a89cf5);transition:width .4s ease;width:0%;}

/* ── QUESTIONS ── */
.questions-wrap{padding:16px;}
.q-card{background:#111120;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;margin-bottom:14px;transition:border-color .2s;}
.q-card.answered{border-color:rgba(124,110,230,0.35);}
.q-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.q-num-badge{min-width:34px;height:34px;border-radius:10px;background:rgba(124,110,230,0.12);border:1px solid rgba(124,110,230,0.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#a89cf5;flex-shrink:0;}
.q-num-badge.answered{background:#7c6ee6;border-color:#7c6ee6;color:#fff;}
.q-topic{font-size:10px;font-weight:600;color:#5e5c78;text-transform:uppercase;letter-spacing:.07em;}
.q-text{font-size:15px;line-height:1.7;color:#ddd9f8;margin-bottom:16px;font-weight:400;}
.options{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.07);border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s;user-select:none;}
.opt:active{transform:scale(.98);}
.opt.selected{background:rgba(124,110,230,0.12);border-color:#7c6ee6;}
.opt-ltr{min-width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#5e5c78;flex-shrink:0;transition:all .18s;}
.opt.selected .opt-ltr{background:#7c6ee6;border-color:#7c6ee6;color:#fff;}
.opt-txt{font-size:14px;color:#c8c5e8;line-height:1.5;padding-top:3px;}
.opt.selected .opt-txt{color:#e8e4ff;}

/* correct/wrong state after submit */
.opt.show-correct{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4);}
.opt.show-correct .opt-ltr{background:#4ade80;border-color:#4ade80;color:#000;}
.opt.show-wrong{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.3);}
.opt.show-wrong .opt-ltr{background:#f87171;border-color:#f87171;color:#fff;}

/* ── SUBMIT ── */
.submit-wrap{padding:0 16px 16px;position:sticky;bottom:0;background:linear-gradient(to top,#08080f 70%,transparent);}
.submit-wrap-inner{padding-top:20px;}
.answered-info{text-align:center;font-size:13px;color:#5e5c78;margin-bottom:12px;}
.answered-info span{color:#a89cf5;font-weight:600;}
.btn-submit{width:100%;padding:16px;background:#7c6ee6;border:none;border-radius:14px;color:#fff;font-family:'Sora',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;}
.btn-submit:active{transform:scale(.98);background:#6457d4;}
.btn-submit:disabled{background:#2a2840;color:#4a4870;cursor:default;}

/* ── RESULT ── */
#result-screen{display:none;padding:16px;}
.res-hero{background:#111120;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;}
.res-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:180px;height:180px;border-radius:50%;filter:blur(50px);pointer-events:none;}
.score-ring{width:120px;height:120px;margin:0 auto 16px;position:relative;}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.score-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.score-big{font-size:30px;font-weight:700;}
.score-of{font-size:12px;color:#5e5c78;}
.res-name{font-size:19px;font-weight:700;margin-bottom:10px;}
.res-verdict{font-size:15px;line-height:1.5;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 16px;font-weight:500;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:#111120;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 6px;text-align:center;}
.stat-lbl{font-size:10px;color:#5e5c78;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-v{font-size:22px;font-weight:700;}
.review-head{font-size:11px;font-weight:700;color:#5e5c78;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.rev-card{background:#111120;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;margin-bottom:8px;}
.rev-qn{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.rev-qt{font-size:13px;color:#c0bde0;line-height:1.5;margin-bottom:8px;}
.rev-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;}
.tg{background:rgba(74,222,128,.1);color:#4ade80;}
.tr{background:rgba(248,113,113,.1);color:#f87171;}
.ts{background:rgba(255,255,255,.05);color:#5e5c78;}
.ta{background:rgba(168,156,245,.1);color:#a89cf5;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-badge">NMIMS NPAT Preparation</div>
  <h1>Number System Mock Test</h1>
  <p>Medium–Hard · Based on previous year patterns</p>
  <div class="meta-row">
    <div class="meta-item"><div class="meta-val">30</div><div class="meta-lbl">Questions</div></div>
    <div class="meta-item"><div class="meta-val">40</div><div class="meta-lbl">Minutes</div></div>
    <div class="meta-item"><div class="meta-val">120</div><div class="meta-lbl">Max Marks</div></div>
    <div class="meta-item"><div class="meta-val">+4/−1</div><div class="meta-lbl">Marking</div></div>
  </div>
</div>

<!-- STICKY TIMER -->
<div class="timer-bar">
  <div>
    <div class="timer-label">Time Left</div>
    <div class="timer-val" id="timer">40:00</div>
  </div>
  <div class="progress-pill" id="prog-pill">0 / 30 answered</div>
</div>
<div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>

<!-- ALL QUESTIONS (single scroll) -->
<div class="questions-wrap" id="questions-wrap"></div>

<!-- SUBMIT BUTTON -->
<div class="submit-wrap" id="submit-wrap">
  <div class="submit-wrap-inner">
    <div class="answered-info">You've answered <span id="ans-count">0</span> of 30 questions</div>
    <button class="btn-submit" id="submit-btn" onclick="confirmSubmit()">Submit Test</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen"></div>

<script>
const questions=[
  {q:"If the HCF of two numbers is 12 and their LCM is 360, and one number is 72, the other number is:",opts:["60","48","36","72"],ans:0},
  {q:"A number when divided by 6 leaves remainder 5, by 9 leaves remainder 8, and by 12 leaves remainder 11. The smallest such number is:",opts:["35","71","107","143"],ans:0},
  {q:"The sum of all prime numbers between 60 and 80 is:",opts:["351","393","404","431"],ans:1},
  {q:"If N = 1! + 2! + 3! + … + 100!, the unit digit of N is:",opts:["1","3","5","7"],ans:1},
  {q:"A number divided by 589 leaves remainder 368. When the same number is divided by 19, the remainder is:",opts:["0","7","11","17"],ans:2},
  {q:"The number of trailing zeros in 100! is:",opts:["20","22","24","25"],ans:2},
  {q:"The expression 2²⁹ + 2³⁰ + 2³¹ + 2³² is divisible by:",opts:["3","7","9","11"],ans:1},
  {q:"The remainder when 7¹⁰⁰ is divided by 48 is:",opts:["1","7","42","47"],ans:0},
  {q:"If x = 3 + 3^(1/3) + 3^(2/3), then x³ − 9x² + 18x − 12 equals:",opts:["1","2","3","4"],ans:0},
  {q:"LCM of two numbers is 20 times their HCF. The HCF is 5 and their sum is 100. The numbers are:",opts:["20 and 80","25 and 75","30 and 70","50 and 50"],ans:0},
  {q:"How many natural numbers from 1 to 1000 are divisible by 5 but NOT by 25?",opts:["160","180","200","220"],ans:0},
  {q:"Which of the following is NOT a perfect square?",opts:["1681","2116","3024","3481"],ans:2},
  {q:"If the product of two numbers is 2160 and their HCF is 12, the number of pairs that exist is:",opts:["1","2","3","4"],ans:1},
  {q:"The last two digits of 7⁸¹ are:",opts:["07","43","63","81"],ans:1},
  {q:"The difference between a 2-digit number and the number formed by reversing its digits is 54. Which of these CANNOT be such a number?",opts:["73","36","91","27"],ans:1},
  {q:"If 5ⁿ ends in 3125, the value of n is:",opts:["5","6","7","8"],ans:0},
  {q:"A 3-digit number equals the sum of cubes of its own digits. Identify which of the following is true:",opts:["153 only","370 only","407 only","All of 153, 370 and 407"],ans:3},
  {q:"N is a 4-digit palindrome divisible by 99. N is:",opts:["1111","2112","9999","8448"],ans:1},
  {q:"The remainder when (32³²)³² is divided by 7 is:",opts:["0","2","4","5"],ans:3},
  {q:"How many pairs of natural numbers have LCM equal to 48?",opts:["8","10","12","16"],ans:1},
  {q:"The greatest number that divides 1305, 4665 and 6905 leaving the same remainder each time is:",opts:["1120","1220","1235","1315"],ans:0},
  {q:"A number leaves remainder 3 when divided by 7. What remainder will its square leave when divided by 7?",opts:["1","2","3","4"],ans:1},
  {q:"The value of (0.1̄ + 0.2̄ + 0.3̄) is:",opts:["2/3","7/9","8/9","1"],ans:1},
  {q:"The largest 4-digit number exactly divisible by 88 is:",opts:["9944","9856","9768","9680"],ans:0},
  {q:"p and q are prime numbers and p + q = 15. Then p × q = ?",opts:["26","30","36","56"],ans:3},
  {q:"A boy multiplied a number by 10 and got 100. If he had multiplied by 12, his answer would differ from the correct answer by:",opts:["10","20","30","40"],ans:1},
  {q:"(1 − 1/2)(1 − 1/3)(1 − 1/4)···(1 − 1/n) simplifies to:",opts:["1/n","2/n","1/(n−1)","2/(n+1)"],ans:0},
  {q:"If 9 divides a number N, then it must also divide:",opts:["N²","N + 9","N − 3","All of these"],ans:3},
  {q:"How many digits does 12¹⁶ have? (Use log 12 ≈ 1.0792)",opts:["17","18","19","20"],ans:0},
  {q:"The digital root of 999999999 (nine 9s) is:",opts:["9","0","1","Cannot be determined"],ans:0}
];

const letters=['A','B','C','D'];
let answers=new Array(30).fill(-1);
let timeLeft=2400;
let timerInt;
let submitted=false;

// Build all questions
function buildQuestions(){
  const wrap=document.getElementById('questions-wrap');
  wrap.innerHTML='';
  questions.forEach((q,i)=>{
    let optsHtml='';
    q.opts.forEach((o,j)=>{
      optsHtml+=`<div class="opt" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <div class="opt-ltr" id="ltr-${i}-${j}">${letters[j]}</div>
        <div class="opt-txt">${o}</div>
      </div>`;
    });
    wrap.innerHTML+=`<div class="q-card" id="qcard-${i}">
      <div class="q-header">
        <div class="q-num-badge" id="qbadge-${i}">${i+1}</div>
        <div class="q-topic">Number System · Q${i+1}</div>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
    </div>`;
  });
}

function selectOpt(qi,oi){
  if(submitted) return;
  const prev=answers[qi];
  if(prev===oi){answers[qi]=-1;}
  else{answers[qi]=oi;}
  // update visuals for this question
  for(let j=0;j<4;j++){
    const el=document.getElementById('opt-'+qi+'-'+j);
    if(el) el.classList.toggle('selected', answers[qi]===j);
  }
  const badge=document.getElementById('qbadge-'+qi);
  const card=document.getElementById('qcard-'+qi);
  if(answers[qi]!==-1){
    badge.classList.add('answered');
    card.classList.add('answered');
  } else {
    badge.classList.remove('answered');
    card.classList.remove('answered');
  }
  updateProgress();
}

function updateProgress(){
  const done=answers.filter(a=>a!==-1).length;
  document.getElementById('prog-pill').textContent=done+' / 30 answered';
  document.getElementById('prog-fill').style.width=((done/30)*100)+'%';
  document.getElementById('ans-count').textContent=done;
}

function startTimer(){
  timerInt=setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60);
    const s=timeLeft%60;
    const el=document.getElementById('timer');
    el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    if(timeLeft<=300&&timeLeft>60) el.className='timer-val warn';
    else if(timeLeft<=60) el.className='timer-val danger';
    if(timeLeft<=0){clearInterval(timerInt);doSubmit();}
  },1000);
}

function confirmSubmit(){
  const done=answers.filter(a=>a!==-1).length;
  const skip=30-done;
  if(skip>0){
    if(!confirm(skip+' question(s) unanswered. Submit anyway?')) return;
  }
  clearInterval(timerInt);
  doSubmit();
}

function doSubmit(){
  submitted=true;
  document.getElementById('submit-wrap').style.display='none';
  showResult();
}

function showResult(){
  // show correct/wrong on cards
  questions.forEach((q,i)=>{
    const ua=answers[i];
    if(ua===-1) return;
    const correctEl=document.getElementById('opt-'+i+'-'+q.ans);
    if(correctEl) correctEl.classList.add('show-correct');
    if(ua!==q.ans){
      const wrongEl=document.getElementById('opt-'+i+'-'+ua);
      if(wrongEl) wrongEl.classList.add('show-wrong');
    }
  });

  let correct=0,wrong=0,skipped=0;
  answers.forEach((a,i)=>{
    if(a===-1) skipped++;
    else if(a===questions[i].ans) correct++;
    else wrong++;
  });
  const score=correct*4-wrong;
  const max=120;
  const pct=Math.max(0,Math.round((score/max)*100));
  const acc=(correct+wrong)>0?Math.round(correct/(correct+wrong)*100):0;

  let rc,verdictColor,verdictMsg,glowCol;
  if(pct>=70){
    rc='#4ade80';verdictColor='#4ade80';glowCol='rgba(74,222,128,0.2)';
    verdictMsg='🎉 nmims mai pakka — yashvi ka pata nahi par 😄';
  } else if(pct>=40){
    rc='#fbbf24';verdictColor='#fbbf24';glowCol='rgba(251,191,36,0.2)';
    verdictMsg='📚 padhle saale theek thaak number aaye hai';
  } else {
    rc='#f87171';verdictColor='#f87171';glowCol='rgba(248,113,113,0.2)';
    verdictMsg='😤 PADHLE PAGLE YE KESA SCORE HAI';
  }

  const circ=2*Math.PI*45;
  const dashOff=circ-(pct/100)*circ;

  let revHtml='';
  questions.forEach((q,i)=>{
    const ua=answers[i];
    let tag,nc;
    if(ua===-1){tag='<span class="tag ts">Skipped</span>';nc='#5e5c78';}
    else if(ua===q.ans){tag='<span class="tag tg">✓ Correct +4</span>';nc='#4ade80';}
    else{tag='<span class="tag tr">✗ Wrong −1</span>';nc='#f87171';}
    const your=ua!==-1?`<span class="tag ta">Yours: ${q.opts[ua]}</span>`:'';
    revHtml+=`<div class="rev-card">
      <div class="rev-qn" style="color:${nc}">Q${i+1}</div>
      <div class="rev-qt">${q.q}</div>
      <div class="rev-tags">${tag}${your}<span class="tag tg">Ans: ${q.opts[q.ans]}</span></div>
    </div>`;
  });

  const rs=document.getElementById('result-screen');
  rs.style.display='block';
  rs.innerHTML=`
    <div class="res-hero">
      <div class="res-glow" style="background:${glowCol}"></div>
      <div class="score-ring">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
          <circle cx="50" cy="50" r="45" fill="none" stroke="${rc}" stroke-width="8"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dashOff.toFixed(1)}"
            stroke-linecap="round"/>
        </svg>
        <div class="score-inner">
          <div class="score-big" style="color:${rc}">${score}</div>
          <div class="score-of">/ ${max}</div>
        </div>
      </div>
      <div class="res-name" style="color:${rc}">Kaustubh, tu ${score}/${max} laya!</div>
      <div class="res-verdict" style="color:${verdictColor}">${verdictMsg}</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-lbl">Correct</div><div class="stat-v" style="color:#4ade80">${correct}</div></div>
      <div class="stat-box"><div class="stat-lbl">Wrong</div><div class="stat-v" style="color:#f87171">${wrong}</div></div>
      <div class="stat-box"><div class="stat-lbl">Skipped</div><div class="stat-v" style="color:#8b88b0">${skipped}</div></div>
      <div class="stat-box"><div class="stat-lbl">Accuracy</div><div class="stat-v" style="color:#a89cf5">${acc}%</div></div>
    </div>
    <div class="review-head">Full Answer Review</div>
    ${revHtml}
    <div style="height:40px"></div>`;

  rs.scrollIntoView({behavior:'smooth'});
}

buildQuestions();
startTimer();
</script>
</body>
</html>
